<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>
<body>
    
     <div class="form-wrapper">
        <h2 class="head">Signup</h2>
        <input type="text" placeholder="Enter username" id="username"><br><br>
    <input type="email" placeholder="enter your Email id" id="email"><br><br>
        <button onclick="signup()">Submit</button><br><br>
       
    </div>
    <style>
        body {
            background-image: url('anichh.jpg'); /* or 'images/background.jpg' */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .form-wrapper 
        {
            margin-top: 40px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.5); /* semi-transparent overlay */
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            color: white;
        }
        input 
        {
            width: 300px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        h1{
            text-align: center;
            margin-bottom: 10%;
        }
        button {
            background-color: rgb(64, 146, 209);
            color: white;
            border: none;
            border-radius: 3px;
            padding: 10px 40px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            opacity: 0.7;
        }

        button:active {
            opacity: 0.4;
        }
        a{
            margin-left: 70%;
        }
        .head
        {
           
         font-family: 'Playfair Display', serif;
        font-size: 35px;
        text-align: center;
        margin: 30px 0;
        color: rgb(186, 177, 179);
        }
    </style>
    <script src="script.js"></script>
</body>
</html>
